<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw AI 助手</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .claw {
            font-size: 4rem;
            animation: wave 2s infinite;
        }
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }
        .status {
            background: #4ade80;
            color: #1a1a2e;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            display: inline-block;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 1rem;
        }
        .info {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        a {
            color: #4ade80;
            text-decoration: none;
        }
        button {
            background: #4ade80;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="claw">🦞</div>
        <h1>OpenClaw AI</h1>
        <p>你的个人 AI 助手，已上线！</p>
        <div class="status">✅ 服务运行中</div>
        <div class="info">
            <p>网关地址: <code>ws://192.168.3.117:18789</code></p>
            <p>网页控制台: <a href="http://192.168.3.117:18789" target="_blank">http://192.168.3.117:18789</a></p>
            <button onclick="window.open('http://192.168.3.117:18789')">打开控制台</button>
        </div>
    </div>
</body>
</html>
